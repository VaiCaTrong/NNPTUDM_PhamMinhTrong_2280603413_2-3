<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập / Đăng ký</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            background: #667eea;
            color: white;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .message.success {
            background: #e8f5e9;
            color: #388e3c;
            border: 1px solid #c8e6c9;
            display: block;
        }
        
        .message.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
            display: block;
        }
        
        .form-content {
            display: none !important;
        }
        
        .form-content.active {
            display: block !important;
        }
        
        .admin-note {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        
        .user-info {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        
        .user-info.show {
            display: block;
        }
        
        .user-info h3 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .user-info p {
            margin: 8px 0;
            color: #666;
        }
        
        .logout-btn {
            background: #dc3545;
            margin-top: 15px;
        }
        
        .logout-btn:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Đăng nhập</button>
            <button class="tab-btn" onclick="switchTab('register')">Đăng ký</button>
        </div>
        
        <div id="message" class="message"></div>
        
        <!-- Login Form -->
        <div id="login" class="form-content active">
            <div class="admin-note">
                💡 Admin: username: <strong>admin</strong>, password: <strong>admin123</strong>
            </div>
            
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-username">Username:</label>
                    <input type="text" id="login-username" required>
                </div>
                
                <div class="form-group">
                    <label for="login-password">Password:</label>
                    <input type="password" id="login-password" required>
                </div>
                
                <button type="submit">Đăng nhập</button>
            </form>
        </div>
        
        <!-- Register Form -->
        <div id="register" class="form-content">
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="register-username">Username:</label>
                    <input type="text" id="register-username" required>
                </div>
                
                <div class="form-group">
                    <label for="register-email">Email:</label>
                    <input type="email" id="register-email" required>
                </div>
                
                <div class="form-group">
                    <label for="register-password">Password:</label>
                    <input type="password" id="register-password" required>
                </div>
                
                <div class="form-group">
                    <label for="register-fullname">Họ tên:</label>
                    <input type="text" id="register-fullname">
                </div>
                
                <button type="submit">Đăng ký</button>
            </form>
        </div>
        
        <!-- User Info -->
        <div id="user-info" class="user-info">
            <h3>👤 Thông tin người dùng</h3>
            <p><strong>Username:</strong> <span id="info-username"></span></p>
            <p><strong>Email:</strong> <span id="info-email"></span></p>
            <p><strong>Vai trò:</strong> <span id="info-role"></span></p>
            <button class="logout-btn" onclick="handleLogout()">Đăng xuất</button>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:3000/api/auth';
        
        function switchTab(tab) {
            document.querySelectorAll('.form-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }
        
        function showMessage(message, type) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = message;
            msgEl.className = `message ${type}`;
            
            setTimeout(() => {
                msgEl.className = 'message';
            }, 5000);
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    showMessage('✅ Đăng nhập thành công!', 'success');
                    
                    setTimeout(() => {
                        showUserInfo(data.user);
                        document.querySelector('form').reset();
                    }, 1000);
                } else {
                    showMessage('❌ ' + data.message, 'error');
                }
            } catch (error) {
                showMessage('❌ Lỗi: ' + error.message, 'error');
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            
            const username = document.getElementById('register-username').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const fullName = document.getElementById('register-fullname').value;
            
            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, fullName })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    showMessage('✅ Đăng ký thành công!', 'success');
                    
                    setTimeout(() => {
                        showUserInfo(data.user);
                        document.querySelector('form').reset();
                    }, 1000);
                } else {
                    showMessage('❌ ' + data.message, 'error');
                }
            } catch (error) {
                showMessage('❌ Lỗi: ' + error.message, 'error');
            }
        }
        
        function showUserInfo(user) {
            document.querySelectorAll('.form-content').forEach(el => el.classList.remove('active'));
            document.getElementById('user-info').classList.add('show');
            
            document.getElementById('info-username').textContent = user.username;
            document.getElementById('info-email').textContent = user.email;
            document.getElementById('info-role').textContent = user.role === 'admin' ? 'Admin' : 'User';
        }
        
        function handleLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            
            document.getElementById('user-info').classList.remove('show');
            document.querySelectorAll('.form-content').forEach(el => el.classList.remove('active'));
            document.getElementById('login').classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            
            showMessage('✅ Đã đăng xuất', 'success');
        }
        
        // Kiểm tra token khi load trang
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            if (token && user) {
                showUserInfo(JSON.parse(user));
            }
        });
    </script>
</body>
</html>
